<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>QRIS Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }
    input {
      background: #334155;
      color: white;
    }
    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    img {
      margin-top: 15px;
      width: 200px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>QRIS Checkout</h2>

  <input type="number" id="amount" placeholder="Masukkan nominal" />
  <button onclick="createQR()">Bayar</button>

  <div id="result"></div>
</div>

<script>
async function createQR() {
  const amount = document.getElementById("amount").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "Loading...";

  try {
    const res = await fetch("/api/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ amount })
    });

    const data = await res.json();

    console.log(data);

    // SESUAIKAN dengan response API kamu
    if (data.qr_image) {
      resultDiv.innerHTML = `
        <p>Scan QR:</p>
        <img src="${data.qr_image}" />
      `;
    } else if (data.qr_string) {
      resultDiv.innerHTML = `
        <p>QR String:</p>
        <textarea style="width:100%">${data.qr_string}</textarea>
      `;
    } else {
      resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    }

  } catch (err) {
    resultDiv.innerHTML = "Error: " + err.message;
  }
}
</script>

</body>
</html>
